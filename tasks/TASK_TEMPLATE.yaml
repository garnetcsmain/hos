# QUICK REFERENCE

## Minimal Task (Quickstart)
Only fill these fields to get started:
- id, title, description
- owner, due_date, estimated_hours
- epic_id, status
- requirements, acceptance_criteria, done_criteria

## Full Task (Comprehensive)
Fill all sections for complex work

## Key Principles
- One task = 1-3 days of work
- If larger, break into subtasks
- Link to epic decision
- Set clear acceptance criteria
- Gate at 25%, 50%, 75%
