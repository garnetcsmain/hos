id: "HOS-2026-001-09"
title: "External notification channels (WhatsApp / SMS / email / Telegram)"
description: |
  Add a channel dispatcher behind the existing notification queue so verified matches
  can actually reach families. WhatsApp + SMS are the priority in Venezuela. Includes
  consent capture at intake, opt-out (STOP) handling, and quiet hours. Board D4 ratified
  in-app-only for Phase 0; this lifts the deferral honestly (no delivery claim without
  real delivery + a delivery receipt).
