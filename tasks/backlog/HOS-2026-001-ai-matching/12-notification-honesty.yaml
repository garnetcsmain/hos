standup:
  - date: "2026-06-30"
    progress: "90% - family-reach obligation landed. Confirming a match no longer resolves the case or claims delivery: it moves both reports to a new 'matched' status and opens a tracked coordinator_callback obligation (queued). A coordinator records the real contact in Messages; only then does the case become 'Resuelto' and a 'family.reached' receipt event is written. An unreachable attempt is tracked (case stays matched). Deceased outcomes carry compassionate, no-automated-channel guidance."
    verified: "9 new tests (5 pure + 4 in-memory integration; 57 total green); typecheck + lint + build clean; end-to-end API run — confirm returns resolved:false with a queued obligation, family-reach reached returns resolved:true and flips the obligation to delivered."
    blockers: "None for the code. External-channel delivery (SMS/WhatsApp/email/Telegram) remains blocked (needs a provider + a signed no-retention DPA, escalate_to_human) and is tracked separately as HOS-2026-001-09."
    next: "D4 re-review of the corrected status semantics + family-reach path. External channel wiring stays gated on human DPA sign-off."
notes: |
  Status/event honesty fix landed 2026-06-28. Family-reach obligation + public-status decoupling landed
  2026-06-30. Chose the board's "tracked human-callback obligation" option (D4 allowed either that or a
  family-readable inbox). The case resolves ONLY on a recorded real contact; deceased handled compassionately.
