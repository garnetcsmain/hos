id: "HOS-2026-001-12"
title: "Notification honesty: queued-not-sent + a real family-reach path"
description: |
  Board D4 found the system recorded a delivery that never happened. Stop claiming
  delivery, and design how a family is actually reached (a tracked human-callback
  obligation, or a real family-readable surface) instead of an untracked promise in
  body text. Also handle the public 'Resuelto' signal compassionately (don't let a
  bare status word — including 'Fallecida' cases — be the only thing a family sees).
