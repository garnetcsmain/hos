id: "HOS-2026-001-13"
title: "Matching trust hardening (Board D1 conditions)"
description: |
  Close the Board D1 RESHAPE conditions on the matching engine. Two are done (AI
  blend clamped so it can only demote/flag and never lift a sub-floor pair over the
  floor; free-text scrubbed of contact patterns before any external call). The rest
  protect against the engine's named failure mode — a confident-looking score on a
  common name that sends a family to the wrong place.
