  - "DONE: free-text PII scrub before external calls (ai/redact.ts) + test"
  - "DONE: asymmetric-apellido robustness + surname-disagreement signal (similarity.ts) + tests"
  - "DONE: base-rate signal — show 'N other open reports share this name' by each candidate (baseRate.ts + views.ts + MatchConsole UI) + tests"
