id: "HOS-2026-001-02"
title: "Persistence + append-only audit, behind a repository layer"
description: |
  Zero-setup local persistence using Node's built-in node:sqlite (WAL, busy_timeout,
  FKs). All access behind repositories so Postgres/Supabase can replace it later
  without touching services. Append-only event store records every state change.
