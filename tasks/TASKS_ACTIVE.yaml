    board_status: "Focused board run 2026-07-01 (Contrarian+Principals+Researcher) — RESHAPE on D1-D3 and D5, ESCALATE on D4. (D1) Authorization modeled as capabilities-on-scoped-resources (action, scope in {global,org:<id>,site:<id>,self}), not a flat role enum — coordinator/agency-admin/field-volunteer/remote-contributor are bundles of capabilities at a scope, not first-class primitives; validated against Primero (UNICEF). Rename the planned person-facing 'responder' role to avoid a verified collision with the existing OrgKind enum value 'responder' in coordination.ts. (D2) Remote/digital contributor is its own capability bundle, a structural peer of field-volunteer (not a flag on it) — org-optional registration preserved per HOS-2026-010-R1; no new geofencing mechanism needed, HOS-2026-010-R1-D2's action-scoping already covers it. (D3) Org isolation MUST be Postgres RLS, fail-closed, keyed on a server-set claim — critical finding: zero coordination write route today checks row ownership (requireCoordinator is the only gate on all 12 privileged routes), and if the org claim ever lands in Supabase user_metadata instead of raw_app_meta_data it fails open silently. Needs a real user<->org<->capability-bundle join table (many-to-many). Hard-blocked on HOS-2026-001-07 (Postgres). (D4 ESCALATE — human policy decision, not engineering): org_id exists on coordination tables (sites/needs/offers) but NOT on case/PII tables (missing_reports/found_reports/verifications) — 'agency-admin sees only their org's PII' is UNBUILDABLE on the most sensitive data today without deciding whether reunification case data is a deliberately shared cross-org pool or needs the same org-partitioning as coordination data (a real, currently-unscoped schema change either way). (D5) Mid-tier 'site-lead' role: real per a verified code-level ownership rule (a supply need's 'received' status may only be set by 'the requesting site' per coordination.ts) but not urgent — include site:<id> as a valid scope value now (near-free, same mechanism as org-scope), defer building/onboarding a named site-lead role until after agency-admin+RLS land."
    tasks: []  # no tasks until D4's human policy decision + human sign-off on the security-model change; hard-blocked on HOS-2026-001-07 (Postgres) same as HOS-2026-001-08's org-isolation work

  - epic_id: "HOS-2026-012"
    title: "Volunteer skill/needs model, donor actor type, and AI task/supply matching (\"three ranked options, human decides\")"
    decision_link: "docs/decision-log/2026-07-01-HOS-012-volunteer-donor-task-matching/judge-decision.yaml"
    status: "planning"
    progress: "0%"
    board_status: "Full 5-persona board run 2026-07-01 (Contrarian+Expansionist+Principals+Researcher+User) — RESHAPE on all 5 sub-decisions. (D1) Switchable volunteer skill: Researcher found NO real precedent for daily-switchable skill (Team Rubicon/ESAR-VHP/FEMA VRC all use persistent, verified skill records) — reshaped to current-state-only (mirrors Offer.status), corrected in-the-moment at match time, not a self-maintained profile page; flagged as a genuinely untested HOS-specific design needing pilot validation. (D2) Volunteer personal-needs (e.g. \"car but no gas\"): model as a Need-type record with subjectType:person, auto-expiring, displayed like an org need (not a pinned personal limitation). (D3) Donor actor type: not a naming collision but a structural one — every table has a hard NOT NULL FK to orgs, no non-org actor concept exists. Resolve via a subjectType:org|person discriminator (Stripe-style) or two-linked-types (Salesforce NPSP-style) — same mechanism as D1/D2, decided deliberately before implementation. Donor onboarding must cost about as much effort as texting a sentence (no org-shaped form). (D4) Location-weighted matching — the most consequential finding: near-unanimous rejection of precise/persistent per-volunteer location tracking (\"movement diary by construction\" per Contrarian; de Montjoye et al. show coarsening is only a weak, slow-acting defense; Operación Tun Tun now has a named fatal case in exactly this population). Reshaped to district-level scoring only (same grain as HOS-2026-007/010), no durable per-volunteer match history (short-TTL counters only), and audit reasons attached to the Need record (not a per-volunteer log). (D5) \"Exactly three\" options: mechanism (scored, reasoned, non-padded, human-decides) approved; the specific number is unvalidated per Researcher (choice-overload meta-analysis shows ~zero effect, Miller's 7±2 explicitly disclaimed by its own author, START — the actual dominant mass-casualty protocol — uses 4 categorical buckets not a ranked list) — reshaped to a floor-gated cap, validated empirically once built, not a hardcoded 3."
    tasks: []  # no tasks until human sign-off; sequenced behind HOS-2026-010 (device-key+PIN identity substrate) and HOS-2026-011 (capability-scoped authorization) actually landing, same as those decisions' own conditions require

