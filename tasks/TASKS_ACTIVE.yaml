# Instructions

## To Add a New Task

1. Create file: `tasks/backlog/HOS-XXXX-epic-name/NN-task-name.yaml`
2. Add entry to this file under the appropriate epic
3. Set status to "todo" and priority
4. Assign to owner (DEV, DEVOPS, QA, CTO, COO, Product)

## To Update Task Status

1. Update task file: `tasks/backlog/HOS-XXXX.../NN-task.yaml` (status, timestamp, progress %)
2. Update this file: reflect the new status

## To Complete a Sprint

1. Archive completed tasks to `tasks/archive/completed/2026-Q2/`
2. Create next sprint: `tasks/sprints/2026-WNNN-sprint.yaml`
3. Start new sprint with updated TASKS_ACTIVE.yaml

