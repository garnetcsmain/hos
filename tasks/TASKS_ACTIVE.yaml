    status: "planning"
    progress: "0%"
    board_status: "Full 5-persona board run 2026-07-02 — RESHAPE toward Option B (assume adversarial state, minimize now); reject A (leaves the named exposure) and C (rebuilds the bunker ahead of Phase 0). Core adversary classification (D1) ESCALATED to human — a board of AI agents must not decide whether the Venezuelan state is in scope; this is the 4th review to name it unanswered. Decisive reshape: field-level encryption is NOT a state-adversary control when the key is co-located with the ciphertext on a foreign-hosted Supabase DB (only crypto in the tree today is randomUUID + timingSafeEqual) — labeling it one would violate the honesty principle; minimization (collect less) + audit-log retention (stop keeping a permanent free-text who-helped-which-family ledger in events.payload) are the controls that actually hold, and both ship now with no external dependency. SHIP-NOW pile (no creds, no political answer): (D3) event-log payload minimization + retention TTL + query-access policy; (D4) close/coarsen the LIVE unauthenticated public search oracle (api/search returns givenName+city+status by bare name — the D3 re-identification CRITICAL, still live in main); (D2) write the field-by-field data-minimization classification; (D4/D5) write the tiered-visibility spec + reachability plan as docs. BLOCKED/ESCALATED pile: (D1) human adversary answer; (D2) field encryption WITH a real key-custody/jurisdiction design (needs human + ideally legal); (D4) ENFORCED refugee/volunteer/coordinator tiers — hard-blocked on Postgres (BLK-001) + a role primitive that does not exist (HOS-2026-011); (D5) heavier censorship-resilience infra — separate later gate only if blocking judged live and only without regressing Phase 0."
