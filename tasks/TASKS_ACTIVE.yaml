    status: "planning"
    progress: "0%"
    board_status: "Board run 2026-07-01 — KILL (D1, server-side face-biometric path), GREEN_LIGHT (D2, non-biometric device-key+PIN path), RESHAPE (D3, geolocation advisory signal). ADDENDUM R1 (2026-07-01, docs/decision-log/.../addendum-r1-judge-decision.yaml): principal proposed on-device-only face-uniqueness dedup at registration (no server storage) + role-vs-action scoping of geofencing for remote/text-based volunteers (e.g. translators). Focused re-review (Contrarian+Principals+Researcher): RESHAPE both — (R1-D1) on-device dedup approved as architecture but must not persist raw embeddings (75-95% reconstructable per real research — treat as a real face, not 'just numbers'), must be framed as accidental-duplicate hygiene not anti-Sybil (structurally can't catch cross-device duplicates — same conclusion World ID/Worldcoin reached), needs a cancelable/salted transform if anything is persisted, and needs shared-device cache lifecycle defined; (R1-D2) ACTION-scoping (does this submission carry a location claim?) strongly preferred over ROLE-scoping (is this account's role exempt?) — HOS has no role primitive today and the planned HOS-2026-001-08 taxonomy doesn't even include 'remote/translator', so role-scoping would expand unbuilt work to serve a soft signal and remains gameable via self-declared role; action-scoping is buildable now and closes the gaming vector by construction. Strongly supported by real precedent (Digital Humanitarian Network/Standby Task Force/MicroMappers, Translators Without Borders' 100k+ self-registering remote volunteers). Human + legal sign-off still required before any build."
    tasks: []  # no tasks until human sign-off; prototyping (cancelable-transform feasibility, real false-match/reject rates) should precede scheduling per R1-D1's next_gate. ADDENDUM R2 (2026-07-01, addendum-r2-judge-decision.yaml): defined "sensitive operations" scope. Governing rule (Principals, convergent across all 4 reviewers): step-up applies only to actions IRREVERSIBLE OR DESTRUCTIVE TO AN EXISTING RECORD, never to creating new content — applied to HOS's verified two-create-only-endpoint surface, the list is EMPTY today. KILL on content-conditional step-up for condition=deceased (unanimous 4/4 — redundant with existing familyReach.ts/isSensitiveOutcome D4 handling, creates a mis-marking incentive, is a duress footgun, no comparable system gates first-time content creation this way per OWASP/NIST/banking research); replace with a non-auth plain-language confirm dialog if any UX safety net wanted. Edit/retract: standing rule only (append-only/tombstone design primary, PIN step-up secondary) for IF such an endpoint is ever built — none exists, none authorized here. Shared-device identity switch: real requirement, but reclassified OUT of "sensitive ops" and INTO D2/HOS-2026-001-08's session design (incoming volunteer activates their own session with their own PIN at handoff — attribution, not step-up) — carry forward as a named requirement, don't drop it.

  - epic_id: "HOS-2026-011"
    title: "Platform role and authorization model (agency-admin, remote/digital contributor, org isolation)"
    decision_link: "docs/decision-log/2026-07-01-HOS-011-role-authorization-model/judge-decision.yaml"
    status: "planning"
