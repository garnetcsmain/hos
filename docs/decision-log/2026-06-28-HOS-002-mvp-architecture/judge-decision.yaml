decision_id: "HOS-2026-002"
phase: "judge_synthesis"
date: "2026-06-28"
judge: "Judge Agent"
board_inputs_considered: [contrarian, expansionist, principals, researcher, user]
decisions:
  - id: "HOS-2026-002-D1"
    verdict: "RESHAPE"
    confidence: 0.83
    rationale: "The deterministic, explainable rule engine is the correct cold-start choice and is vindicated by Researcher's industry comparison (ICRC/Primero/Person Finder all use human-verified, explainable matching, none use a phantom trained model), and User confirms the Spanish evidence chain plus contradiction flags are the one part a coordinator would trust. But three confirmed defects break the engine's own stated purpose: the symmetric 50/50 AI blend (Principals F2, confirmed at blend.ts:25) lets an unvalidated external model lift a sub-floor pair OVER the MATCH_FLOOR — equal authority to manufacture false hope, contradicting the 'force multiplier not authority' comment; common-name and asymmetric-surname false positives clear the floor with no penalty (Contrarian F1, Researcher F1/F2 confirmed by executing the algorithm — 'Jose Garcia' vs 'Jose Garcia Perez' = 67%); and 'PII minimized before external call' is only structurally true — free-text description is shipped verbatim to US cloud providers (all five reviewers). These are crisis-grade harms (wrong morgue) and a trust-layer misstatement, not polish."
    conditions:
      - "Clamp the AI blend so an external signal can only DEMOTE or FLAG, never raise a blended score above the deterministic baseline (and never lift a sub-floor pair over MATCH_FLOOR). The baseline must remain the ceiling."
      - "Surface base-rate / name-commonness to the coordinator: show 'N other open reports share this name' alongside every candidate score so the human absorbs the common-name collision risk (Contrarian F1, Researcher F2)."
      - "Add a surname-disagreement signal: an actively contradictory second apellido must reduce score, and matched-surname-count asymmetry must not silently drop name evidence from the denominator (Researcher F1; Contrarian no-name-renormalization edge case)."
      - "Stop presenting the bare percentage as calibrated confidence. Relabel as a sorting/triage aid in the UI until labeled outcomes exist (Principals, User F5)."
      - "Content-aware PII handling before any external call: either strip/flag likely-PII from free-text description or require an explicit per-deployment opt-in with a no-retention/no-train DPA. Correct the proposal's 'PII minimized' claim to 'PII minimized at the field level; free-text not yet sanitized' (all reviewers)."
      - "Preserve the immutable factor-vector snapshot the coordinator actually saw at decision time; AI re-scoring must not clobber it (Expansionist data-poisoning check)."
    next_gate: "Re-review after blend clamp + base-rate signal + surname penalty land, with a calibration plan once the first ~200 human verifications accrue; do not enable any cloud-AI provider key in a real deployment until the DPA/no-retention condition is signed off by a human (see escalate_to_human)."
  - id: "HOS-2026-002-D2"
    verdict: "GREEN_LIGHT"
    confidence: 0.88
    rationale: "Unanimous across the board: node:sqlite behind a repository layer with an append-only event store is the simplest thing that satisfies auditability and offline/edge crisis-fit today, and Researcher shows it mirrors the proven RapidFTR/Primero offline-first pattern. Principals and Researcher both rate the single-node write ceiling LOW and correctly deferred, with a real Postgres exit ramp. The only substantive defect is Contrarian F7 (hand-rolled BEGIN/COMMIT on a global singleton: nested-transaction throw reachable via intake to augment, weak isolation) — a fixable correctness bug that does not touch the architectural decision."
    conditions:
      - "Fix the transaction wrapper before it bites: guard against nested BEGIN (the intake to augment path can nest per Contrarian F7), and add a test proving intake to AI-augment does not start a transaction within a transaction."
      - "Verify node:sqlite serializes exec on the singleton under Next.js request concurrency, or add explicit serialization, so interleaved BEGIN/COMMIT cannot commit partial work."
      - "Per Expansionist, model org/actor as real columns NOW while data is small (this is cheap and the corpus-provenance bottleneck) — coordinated with the D3 reshape."
    next_gate: "Spot-check at the migration trigger (second agency writing concurrently, or sustained write contention); no gate needed before then beyond landing the transaction fix."
  - id: "HOS-2026-002-D3"
    verdict: "RESHAPE"
    confidence: 0.9
    rationale: "The token mechanism itself (constant-time compare, rate-limited, zod-validated) is appropriately simple, but the dev-open-when-unset default is fail-OPEN on life-safety endpoints and was independently flagged CRITICAL/HIGH by all five reviewers (auth.ts:16-22 confirmed). The exact teams who run this — volunteers on a borrowed VPS, no DevOps — are the most likely to deploy with the env var unset, silently exposing full PII and letting anonymous callers confirm reunifications (Principals F1, Researcher F3, User F4). Separately, the single shared token plus self-reported verifierOrg in the request body (verification.ts:71) means the append-only audit log records an attacker/typist-supplied actor — auditability theater for the highest-stakes action (Contrarian F4, Researcher F4, User F3, Expansionist F4). Not a KILL because both are fixable without abandoning the Phase-0 token model."
    conditions:
      - "FAIL CLOSED: unset HOS_COORDINATOR_TOKEN must make privileged endpoints return 503, not open. Dev-open must require an explicit opt-in env var (e.g. HOS_DEV_OPEN=1) so 'open' is something a human typed, never something they forgot (Principals, Contrarian, Researcher, User all converge on this)."
      - "Add a deploy/boot guard that refuses to start in any non-local NODE_ENV when no token and no explicit dev-open flag is set."
      - "Make actor attribution non-forgeable enough for Phase 0: if one shared token is kept, do NOT let the audit log imply per-org accountability it cannot provide — record that the actor org is self-declared, and seed a real org/actor entity now (coordinated with D2) so multi-agency accountability is not a retrofit (Expansionist bottleneck)."
      - "Re-scope open public search as its own decision: name+city enumeration re-identifies people in hiding (Contrarian F6, User F6). Either rate-limit/obscure name enumeration or get an explicit threat-model sign-off that targeted-violence adversaries are out of scope for Venezuela 2026 — the framing makes that hard to assume."
    next_gate: "Human security sign-off required before any deploy (see escalate_to_human). Re-review the fail-closed default and the public-search re-identification decision together before HOS-2026-002 ships to any real environment."
  - id: "HOS-2026-002-D4"
    verdict: "RESHAPE"
    confidence: 0.85
    rationale: "The honesty intent is the best-reasoned part of the package — the notification body explicitly says 'verificación humana, no confirmación automática', contact is redacted, and resolution+notification are atomic (Principals F5 rates the honesty layer cleanest in the package). But the implementation contradicts its own principle: status is hardcoded 'sent' (verification.ts:32) and a family.notified event is appended (verification.ts:113) for a message that has NO family-readable surface — the notifications endpoint is coordinator-gated, so the message addressed to 'su familiar' lands in a room the mother is locked out of (Contrarian F5, User F1 both CRITICAL). The User review is decisive here: María's only family-facing signal is a public status flipping to 'Resuelto' with condition stripped — she cannot tell if her son is alive, hospitalized, or deceased (User F2). 'In-app only' is the honest floor for the channel decision, but the data model currently records a delivery that did not happen — the exact false-delivery harm D4 promised never to make. Refunite's ground truth (Researcher) is that SMS/USSD, not in-app, is the real reach in low-connectivity contexts."
    conditions:
      - "Stop claiming delivery: status must be 'queued' not 'sent', and the event must be 'notification.queued' not 'family.notified'. 'family.notified' may only ever be written by a channel that actually reached the family (Contrarian F5, User F1)."
      - "Either build a family-readable surface for the in-app message or stop addressing the notification to the family; if the real workflow is a human callback, model that callback as a tracked obligation, not an untracked promise in body text (User F1)."
      - "Handle the public 'Resuelto' signal honestly: do not let a bare status word be the only thing a family sees. At minimum, decouple public-status flip from queue so a human can reach the family first, and design a compassionate path for the 'Fallecida' case before this is used in anger (User F2, User 'what I don't know')."
      - "Keep the channel/status outbox abstraction (Expansionist F5 — it is a sound provider-agnostic seam); just ensure status transitions reflect reality (queued to delivered to read)."
    next_gate: "Re-review once status semantics are corrected and a family-reach path (callback obligation or real inbox) is specified; before any external channel (SMS/WhatsApp) is wired, escalate to human (real PII leaving the system)."
overall: "The Phase 0 MVP architecture is sound enough to keep building on — its spine (deterministic explainable matcher, repository-backed node:sqlite, append-only event store, mandatory human verification gate) is the right cold-start substrate, matches what every comparable real-world system converged on, and was correct to abandon HOS-2026-001's phantom 5000-match ML model. D2 is a clean green; D1/D3/D4 are reshapes, not kills, because every defect is fixable without discarding the architecture. The single most urgent fix is D3's fail-open auth default (auth.ts:16-22): it is the one defect that, on a routine misconfigured deploy by exactly the low-resource volunteer teams this is built for, silently exposes full PII and lets anonymous callers confirm reunifications — flip it to fail-closed with an explicit dev-open opt-in before anything else. The closely-coupled runner-up is D4's hardcoded 'sent'/'family.notified', which makes the system record a delivery that never happened, directly violating the trust layer; correct the status semantics in the same pass. Do not enable any cloud-AI provider key or external messaging channel in a real deployment until the human sign-offs below are obtained."
escalate_to_human:
  - "D3 fail-closed auth change and the open-public-search re-identification decision — both touch deploy-time security and must have explicit human security sign-off before any real deployment."
  - "D1 cloud-AI enablement — no provider key may be set in a real deployment until a no-retention/no-train DPA is signed and the 'PII minimized' claim is corrected; free-text description currently leaves the system verbatim."
  - "D4 external channel wiring (SMS/WhatsApp/email/Telegram) — the first moment real PII is transmitted to families/providers; requires human sign-off and the corrected queued-not-sent semantics in place first."
  - "Confirmation of the real Venezuela-2026 threat model (targeted-violence adversaries in scope?) and how many people share the coordinator token — decisive for D3 severity and currently unknown to the board."
